# Starship prompt configuration
# Requires a Nerd Font for the icons below.

"$schema" = "https://starship.rs/config-schema.json"

add_newline = false
command_timeout = 1000
palette = "tokyo_night"

format = """
$os\
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$kubernetes\
$cmd_duration\
$line_break\
$character"""

# Tokyo Night-inspired colors keep every module visually consistent.
[palettes.tokyo_night]
foreground = "#c0caf5"
muted = "#565f89"
blue = "#7aa2f7"
cyan = "#7dcfff"
green = "#9ece6a"
magenta = "#bb9af7"
orange = "#ff9e64"
red = "#f7768e"
yellow = "#e0af68"

# Prompt indicator
[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

# Operating system
[os]
disabled = false
format = "[$symbol]($style) "
style = "bold blue"

[os.symbols]
Windows = ""
Arch = "󰣇"
Ubuntu = ""
Macos = "󰀵"

# User and host are useful remotely, but unnecessary in local sessions.
[username]
disabled = false
show_always = false
format = "[$user]($style)@"
style_user = "bold foreground"
style_root = "bold red"

[hostname]
disabled = false
ssh_only = true
format = "[$hostname]($style) "
style = "bold yellow"

# Working directory
[directory]
format = "[  $path]($style)[$read_only]($read_only_style) "
style = "bold cyan"
home_symbol = "~"
read_only = " "
read_only_style = "bold red"
truncation_length = 3
truncation_symbol = "…/"

# Git
[git_branch]
format = "[$symbol$branch]($style) "
style = "bold magenta"
symbol = " "
truncation_symbol = "…"

[git_status]
format = "([$all_status$ahead_behind]($style) )"
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
conflicted = " ${count}"
deleted = " ${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
modified = " ${count}"
renamed = "󰑕 ${count}"
staged = " ${count}"
stashed = "󰏗 ${count}"
untracked = " ${count}"
up_to_date = ""

# Kubernetes context stays prominent to reduce wrong-cluster mistakes.
[kubernetes]
disabled = false
format = "[$symbol$context( \\($namespace\\))]($style) "
style = "bold blue"
symbol = "󱃾 "

# Only surface commands slow enough to be worth noticing.
[cmd_duration]
format = "[󱎫 $duration]($style) "
min_time = 2000
show_milliseconds = false
style = "bold orange"

# Disabled until these contexts are useful in the prompt.
[docker_context]
disabled = true

[helm]
disabled = true

[nodejs]
disabled = true

[python]
disabled = true

[ruby]
disabled = true

[terraform]
disabled = true

[vagrant]
disabled = true
