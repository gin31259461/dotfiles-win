# ~/.config/starship.toml
"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false
command_timeout = 1000
format = """$os$username$hostname$kubernetes$directory$git_branch$git_status"""

[character]
success_symbol = '[пҖҢ ](bold green)'
error_symbol = '[пҖҚ](bold red)'

# в•ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•®
# в”Ӯ рҹҡҖ Main Format Config         в”Ӯ
# в•°в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•Ҝ

[os]
format = '[$symbol](bold white) '
disabled = false

[os.symbols]
Windows = 'оҳӘ '
Arch = 'у°ЈҮ '
Ubuntu = 'пҢӣ '
Macos = 'у°Җө '

# Shows the username
[username]
style_user = 'white bold'
style_root = 'black bold'
format = '[$user]($style) '
disabled = false
show_always = true

# Shows the hostname
[hostname]
ssh_only = false
format = 'on [$hostname](bold yellow) '
disabled = false

# Shows current directory
[directory]
truncation_length = 1
truncation_symbol = 'вҖҰ/'
home_symbol = 'у°Ӣң ~'
read_only_style = '197'
read_only = ' пҖЈ '
format = 'at [$path]($style)[$read_only]($read_only_style) '

# Shows current git branch
[git_branch]
symbol = 'пҮ’ '
format = 'вһң [$symbol$branch]($style) '
# truncation_length = 4
truncation_symbol = 'вҖҰ/'
style = 'bold green'

# Shows current git status
[git_status]
format = '[$all_status$ahead_behind]($style) '
style = 'bold green'
conflicted = 'рҹҸі'
up_to_date = ''
untracked = 'п”© '
ahead = 'вҮЎ${count}'
diverged = 'вҮ•вҮЎ${ahead_count}вҮЈ${behind_count}'
behind = 'вҮЈ${count}'
stashed = 'пғҮ '
modified = 'пҒ„ '
staged = '[++\($count\)](green)'
renamed = 'о«  '
deleted = 'пҖ” '

[cmd_duration]
min_time = 0
show_milliseconds = true
format = '[$duration]($style) '

# в•ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•®
# в”Ӯ рҹҡҖ Specific Context Format    в”Ӯ
# в•°в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•Ҝ

# Shows kubernetes context and namespace
[kubernetes]
format = 'вһң [уұғҫ $context\($namespace\)](bold purple) '
disabled = false

# в•ӯв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•®
# в”Ӯ рҹҡҖ Disabled                   в”Ӯ
# в•°в”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв”Җв•Ҝ

[vagrant]
disabled = true

[docker_context]
disabled = true

[helm]
disabled = true

[python]
disabled = true

[nodejs]
disabled = true

[ruby]
disabled = true

[terraform]
disabled = true

